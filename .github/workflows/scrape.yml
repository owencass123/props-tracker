name: Scrape Props & Update Dashboard

on:
  # Every hour 11 AM–9 PM CT (CDT = UTC-5, Apr–Nov)
  # 11 AM CT = 16 UTC ... 9 PM CT = 02 UTC next day
  schedule:
    - cron: '0 16-23,0-2 * * *'
  workflow_dispatch:   # lets you trigger manually from GitHub any time

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          UNABATED_USERNAME: ${{ secrets.UNABATED_USERNAME }}
          UNABATED_PASSWORD: ${{ secrets.UNABATED_PASSWORD }}
        run: python scraper.py

      - name: Update results (MLB API)
        run: python update_results.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || \
            git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
